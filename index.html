<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>核心字彙</title>
<style>
/* ============================================================
   主題色彩變數（深色主題）
   ============================================================ */
:root{
  --bg:#0a0e1c;            /* 深藍黑背景 */
  --bg2:#0f1429;
  --panel:#151b34;        /* 面板 */
  --card:#3a2d7a;         /* 字卡深紫 */
  --card2:#2b2f63;        /* 字卡深藍 */
  --cardGrad:linear-gradient(150deg,#3a2d7a 0%,#2b2f63 100%);
  --text:#eef1fb;
  --muted:#9aa3bd;
  --line:#26304f;
  --primary:#7c5cff;
  --primary-d:#6a48f0;
  --success:#34d399;
  --danger:#ff5d6c;
  --warning:#ffb23e;
  --familiar:#34d399;     /* 熟 */
  --normal:#ffb23e;       /* 普通 */
  --weak:#ff5d6c;         /* 不熟 */
  --new:#5b6584;          /* 未學 */
  --radius:22px;
  --radius-s:14px;
  --nav-h:62px;
  --maxw:430px;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
html{background:#000;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.5;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* 手機模擬器置中（桌機） */
#app{
  position:relative;
  width:100%;
  max-width:var(--maxw);
  height:100dvh;
  margin:0 auto;
  background:var(--bg);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 0 60px rgba(0,0,0,.6);
}

/* 內容捲動區 */
.view{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:calc(env(safe-area-inset-top,0px) + 8px) 16px 24px;
}
.view.with-nav{padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px) + 16px);}

/* ============================================================
   通用元件
   ============================================================ */
h1,h2,h3{margin:0;font-weight:800;letter-spacing:.3px;}
.muted{color:var(--muted);}
.small{font-size:13px;}
.center{text-align:center;}
.row{display:flex;align-items:center;gap:10px;}
.row.wrap{flex-wrap:wrap;}
.spread{justify-content:space-between;}
.grow{flex:1;}
.hidden{display:none !important;}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;margin:4px 0 14px;min-height:40px;
}
.topbar h2{font-size:20px;}

.iconbtn{
  width:42px;height:42px;flex:0 0 42px;
  border:none;border-radius:50%;
  background:var(--panel);color:var(--text);
  font-size:18px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:.15s;
}
.iconbtn:active{transform:scale(.9);background:#1d2745;}
.iconbtn.playing{background:var(--primary);color:#fff;}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  min-height:50px;padding:12px 18px;border:none;border-radius:var(--radius-s);
  background:var(--panel);color:var(--text);
  font-size:16px;font-weight:700;cursor:pointer;transition:.15s;
  width:100%;
}
.btn:active{transform:scale(.97);}
.btn.primary{background:var(--primary);color:#fff;}
.btn.primary:active{background:var(--primary-d);}
.btn.success{background:var(--success);color:#06281d;}
.btn.danger{background:var(--danger);color:#fff;}
.btn.ghost{background:transparent;border:1.5px solid var(--line);}
.btn:disabled{opacity:.4;cursor:default;}
.btn.sm{min-height:44px;font-size:14px;padding:8px 12px;}

.panel{
  background:var(--panel);border-radius:var(--radius);
  padding:16px;margin-bottom:14px;
}

.badge{
  display:inline-block;padding:3px 9px;border-radius:20px;
  font-size:12px;font-weight:700;background:#26304f;color:var(--muted);
}
.badge.familiar{background:rgba(52,211,153,.18);color:var(--familiar);}
.badge.normal{background:rgba(255,178,62,.18);color:var(--normal);}
.badge.weak{background:rgba(255,93,108,.18);color:var(--weak);}
.badge.new{background:rgba(91,101,132,.22);color:#b6bfda;}
.badge.pos{background:rgba(124,92,255,.2);color:#c3b4ff;}

/* 大功能按鈕格 */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.tile{
  background:var(--panel);border-radius:var(--radius-s);
  padding:16px 12px;text-align:center;cursor:pointer;border:none;color:var(--text);
  transition:.15s;min-height:78px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;
}
.tile:active{transform:scale(.96);background:#1d2745;}
.tile .ico{font-size:24px;}
.tile .lb{font-size:14px;font-weight:700;}
.tile.accent{background:var(--cardGrad);}

/* 進度條 */
.bar{height:10px;border-radius:8px;background:#1d2745;overflow:hidden;display:flex;}
.bar > span{height:100%;display:block;}
.seg-familiar{background:var(--familiar);}
.seg-normal{background:var(--normal);}
.seg-weak{background:var(--weak);}
.seg-new{background:var(--new);}

/* ============================================================
   底部導航
   ============================================================ */
.nav{
  position:absolute;left:0;right:0;bottom:0;z-index:30;
  height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));
  padding-bottom:env(safe-area-inset-bottom,0px);
  background:rgba(15,20,41,.96);
  backdrop-filter:blur(12px);
  border-top:1px solid var(--line);
  display:flex;
}
.nav button{
  flex:1;background:none;border:none;color:var(--muted);
  font-size:11px;font-weight:600;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
}
.nav button .ico{font-size:21px;}
.nav button.active{color:var(--primary);}

/* ============================================================
   字卡
   ============================================================ */
.fc-wrap{
  perspective:1400px;width:100%;
  height:min(56vh,440px);margin:8px 0 14px;
}
.fc{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;transition:transform .5s;cursor:pointer;
}
.fc.flip{transform:rotateY(180deg);}
.fc-face{
  position:absolute;inset:0;backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border-radius:var(--radius);background:var(--cardGrad);
  border:1px solid rgba(255,255,255,.06);
  display:flex;flex-direction:column;
  padding:18px;overflow:hidden;
  box-shadow:0 14px 40px rgba(0,0,0,.45);
}
.fc-back{transform:rotateY(180deg);background:linear-gradient(150deg,#222a52 0%,#1a2046 100%);}
.fc-top{display:flex;justify-content:space-between;align-items:center;}
.fc-body{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;overflow-y:auto;gap:10px;padding:6px 2px;
}
.fc-word{font-size:clamp(26px,8vw,42px);font-weight:800;word-break:break-word;}
.fc-hint{font-size:13px;color:var(--muted);}
.sense-list{display:flex;flex-direction:column;gap:12px;width:100%;}
.sense{
  background:rgba(255,255,255,.05);border-radius:12px;padding:10px 12px;text-align:left;
}
.sense .pos{font-size:13px;color:#c3b4ff;font-weight:700;margin-bottom:2px;}
.sense .mean{font-size:clamp(16px,4.6vw,21px);line-height:1.45;word-break:break-word;}
.fc-zh-big{font-size:clamp(18px,5.2vw,26px);font-weight:700;line-height:1.5;}

.fav-on{color:var(--warning) !important;}

/* 熟悉度三按鈕 */
.fam-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:6px;}
.fam-btn{
  min-height:50px;border:none;border-radius:var(--radius-s);font-weight:700;font-size:15px;
  cursor:pointer;color:#fff;transition:.15s;
}
.fam-btn:active{transform:scale(.95);}
.fam-weak{background:var(--weak);}
.fam-normal{background:var(--normal);color:#3a2600;}
.fam-familiar{background:var(--familiar);color:#06281d;}

.nav-arrows{display:flex;gap:12px;margin-top:12px;}

/* 詞語清單 / 收藏 / 錯字本小卡 */
.wcard{
  background:var(--panel);border-radius:var(--radius-s);padding:12px 14px;margin-bottom:10px;
  display:flex;align-items:center;gap:10px;cursor:pointer;border-left:4px solid var(--new);
}
.wcard.s-familiar{border-left-color:var(--familiar);}
.wcard.s-normal{border-left-color:var(--normal);}
.wcard.s-weak{border-left-color:var(--weak);}
.wcard .w-en{font-size:18px;font-weight:800;}
.wcard .w-zh{font-size:14px;color:var(--muted);margin-top:2px;line-height:1.4;word-break:break-word;}
.wcard .acts{display:flex;gap:4px;flex:0 0 auto;}

/* 篩選 chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{
  flex:0 0 auto;padding:8px 14px;border-radius:20px;background:var(--panel);
  color:var(--muted);font-size:14px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;
}
.chip.active{background:var(--primary);color:#fff;}

.search{
  width:100%;min-height:46px;border-radius:var(--radius-s);border:1px solid var(--line);
  background:var(--panel);color:var(--text);padding:10px 14px;font-size:15px;margin-bottom:12px;
}
.search:focus{outline:none;border-color:var(--primary);}

/* 測驗 */
.opt{
  width:100%;text-align:left;background:var(--panel);border:2px solid transparent;
  border-radius:var(--radius-s);padding:15px 16px;margin-bottom:10px;font-size:16px;
  color:var(--text);cursor:pointer;word-break:break-word;line-height:1.4;transition:.12s;
}
.opt:active{transform:scale(.99);}
.opt.correct{border-color:var(--success);background:rgba(52,211,153,.16);}
.opt.wrong{border-color:var(--danger);background:rgba(255,93,108,.16);}
.opt.dim{opacity:.5;}
.q-prompt{
  font-size:clamp(22px,6vw,30px);font-weight:800;text-align:center;
  margin:18px 0 22px;word-break:break-word;line-height:1.4;
}

/* 配對 */
.match-grid{display:grid;gap:10px;}
.mcard{
  border-radius:var(--radius-s);background:var(--panel);
  min-height:78px;display:flex;align-items:center;justify-content:center;text-align:center;
  padding:8px;font-weight:700;cursor:pointer;border:2px solid transparent;
  word-break:break-word;line-height:1.3;transition:.12s;
}
.mcard.en{font-size:clamp(14px,4.2vw,18px);}
.mcard.zh{font-size:clamp(12px,3.4vw,15px);color:#d6dcf0;}
.mcard.sel{border-color:var(--primary);background:#23284d;}
.mcard.ok{background:rgba(52,211,153,.25);border-color:var(--success);opacity:0;transform:scale(.55);pointer-events:none;transition:.3s;}
.mcard.err{animation:shake .35s;border-color:var(--danger);}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}

/* 統計卡 */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stat-cell{background:var(--panel);border-radius:var(--radius-s);padding:14px;}
.stat-cell .num{font-size:28px;font-weight:800;}
.stat-cell .lb{font-size:13px;color:var(--muted);}

/* 設定列 */
.set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
.set-row:last-child{border-bottom:none;}
.switch{position:relative;width:50px;height:30px;flex:0 0 50px;}
.switch input{display:none;}
.switch .sl{position:absolute;inset:0;background:#2a3354;border-radius:30px;transition:.2s;cursor:pointer;}
.switch .sl::before{content:"";position:absolute;width:24px;height:24px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s;}
.switch input:checked + .sl{background:var(--primary);}
.switch input:checked + .sl::before{transform:translateX(20px);}
input[type=range]{width:140px;accent-color:var(--primary);}
select{
  background:var(--panel);color:var(--text);border:1px solid var(--line);
  border-radius:10px;padding:8px 10px;font-size:14px;
}

/* 區段選擇按鈕（題數/題型等） */
.seg{display:flex;gap:8px;flex-wrap:wrap;}
.seg button{
  flex:1;min-width:64px;min-height:44px;border:1.5px solid var(--line);background:var(--panel);
  color:var(--muted);border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;
}
.seg button.active{background:var(--primary);border-color:var(--primary);color:#fff;}

/* Part 選擇：依文字長度自動撐開、自動換行，長名稱字級略縮，不切字不爆版 */
.partsel{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;}
.partsel button{
  min-height:42px;padding:7px 11px;border:1.5px solid var(--line);background:var(--panel);
  color:var(--muted);border-radius:13px;font-weight:700;font-size:clamp(11px,3vw,14px);
  cursor:pointer;white-space:normal;line-height:1.2;max-width:100%;
}
.partsel button.active{background:var(--primary);border-color:var(--primary);color:#fff;}

.empty{
  text-align:center;color:var(--muted);padding:50px 20px;
}
.empty .ico{font-size:46px;margin-bottom:10px;}

.toast{
  position:absolute;left:50%;bottom:calc(var(--nav-h) + 24px);transform:translateX(-50%);
  background:#222a52;color:#fff;padding:11px 18px;border-radius:30px;font-size:14px;font-weight:600;
  z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.5);opacity:0;transition:.25s;pointer-events:none;
  max-width:90%;text-align:center;
}
.toast.show{opacity:1;}

.divider{height:1px;background:var(--line);margin:14px 0;}
.unit-row{
  background:var(--panel);border-radius:var(--radius-s);padding:14px;margin-bottom:10px;cursor:pointer;
  border:2px solid transparent;transition:.12s;
}
.unit-row:active{transform:scale(.99);}
.unit-row.active{border-color:var(--primary);}
.unit-row .u-no{font-size:13px;color:#c3b4ff;font-weight:700;}
.unit-row .u-title{font-size:16px;font-weight:700;margin:2px 0;word-break:break-word;}
.dropzone{
  border:2px dashed var(--line);border-radius:var(--radius);padding:34px 18px;text-align:center;
  cursor:pointer;transition:.15s;
}
.dropzone:active{background:var(--panel);}
.dropzone .ico{font-size:46px;margin-bottom:10px;}
</style>
</head>
<body>
<div id="app">
  <div id="view" class="view"></div>
  <nav id="nav" class="nav hidden"></nav>
  <div id="toast" class="toast"></div>
</div>

<input type="file" id="fileInput" accept=".json,application/json" class="hidden">

<script>
"use strict";
/* ============================================================
   英語核心字彙 — 單字卡 App（單檔、無框架、無 CDN）
   資料一律來自匯入的 vocabulary.json 或 localStorage，
   不在程式碼內寫死任何單字資料。
   ============================================================ */

/* ---------- localStorage 鍵名 ---------- */
const LS = {
  data:    "vocab_data_v1",        // 舊版單本快取（用於自動遷移到書庫）
  prog:    "vocab_progress_v1",
  settings:"vocab_settings_v1",
  scope:   "vocab_scope_v1",
  library: "vocab_library_v1",     // 書庫目錄（書本 meta 陣列）
  curBook: "vocab_curbook_v1",     // 目前使用中的書本 id
  daily:   "vocab_daily_v1"        // 每日學習量紀錄（跨書本，養成習慣用）
};
function bookKey(id){ return "vocab_book_"+id; }   // 各書本 JSON 的儲存鍵

/* ---------- 全域狀態 ---------- */
const state = {
  raw:null,        // 原始 JSON
  flat:[],         // 攤平後的單字清單
  byId:{},         // id -> word
  meta:{source:"",levels:"",total:0,basic:0,advanced:0,units:0},
  prog:{},         // id -> 學習狀態
  settings:defaultSettings(),
  scope:{part:"all",unit:"all",special:null}, // special: null | 'fav' | 'wrong'
  view:"import",
  library:[],      // 書本 meta 陣列：{id,name,levels,total,prefix,addedAt}
  book:null,       // 目前使用中的書本 meta
  daily:{}         // 每日學習量：{ "YYYY-MM-DD": {actions, words} }
};

function defaultSettings(){
  return {
    rate:0.95, volume:1, pitch:1,
    fcFront:"en",      // en=正面英文 / zh=正面中文
    fcOrder:"original",// original / random
    fcOnlyWeak:false,
    fcOnlyToday:false,
    autoSpeak:true,    // 切換上/下一張卡片時自動念一次（預設開啟）
    listenFirst:false,
    dailyGoal:20,      // 每日學習目標（單字數）
    // 自動連續播放
    apRepeat:1,        // 每字英文朗讀次數
    apItemGap:0.8,     // 同卡內段落間停頓（英文重複、英文→中文）（秒）
    apZh:true,         // 是否接著念中文意思
    apFlip:true,       // 念中文時自動翻面顯示中文
    apGap:0.8,         // 卡片間隔（秒）
    apLoop:false       // 播到最後是否循環
  };
}

/* ============================================================
   工具函式
   ============================================================ */
const $ = sel => document.querySelector(sel);
const viewEl = () => document.getElementById("view");

function esc(s){
  return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
// 以「裝置本地時間」格式化 YYYY-MM-DD（避免 toISOString 的 UTC 造成日期差一天）
function ymd(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function todayStr(){ return ymd(new Date()); }
function addDays(n){
  const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()+n);
  return ymd(d);
}
function shuffle(a){
  a=a.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function sample(arr,n){return shuffle(arr).slice(0,n);}

let toastTimer=null;
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),1800);
}

/* ============================================================
   資料：載入 / 攤平
   ============================================================ */
function buildFlat(raw,prefix){
  prefix=prefix||"";
  const flat=[], byId={};
  let basic=0, advanced=0, units=0;
  (raw.parts||[]).forEach(p=>{
    (p.units||[]).forEach(u=>{
      units++;
      (u.words||[]).forEach(w=>{
        const id = `${prefix}${p.part}_${u.unit}_${w.no}_${w.word}`;
        // 優先採用 senses；若無則退回 word.pos / word.meaning
        let senses;
        if(Array.isArray(w.senses) && w.senses.length){
          senses = w.senses.map(s=>({pos:s.pos||"",meaning:s.meaning||""}));
        }else{
          senses = [{pos:w.pos||"",meaning:w.meaning||""}];
        }
        const item={
          id, part:p.part, partNo:p.part_no,
          unit:u.unit, titleEn:u.title_en||"", category:u.category||"",
          page:u.page||"", wordCount:u.word_count||u.words.length,
          no:w.no, word:w.word, senses,
          pos:w.pos||senses[0].pos||"", meaning:w.meaning||senses[0].meaning||""
        };
        flat.push(item); byId[id]=item;
        if(p.part==="Basic")basic++; else if(p.part==="Advanced")advanced++;
      });
    });
  });
  return {flat,byId,basic,advanced,units};
}

function loadData(raw,prefix){
  if(!raw || !Array.isArray(raw.parts)) throw new Error("找不到 parts 陣列");
  const built=buildFlat(raw,prefix||"");
  if(!built.flat.length) throw new Error("單字數為 0，請確認 JSON 內容");
  state.raw=raw;
  state.flat=built.flat;
  state.byId=built.byId;
  state.meta={
    source:raw.source||"", levels:raw.levels||"",
    total:built.flat.length, basic:built.basic, advanced:built.advanced, units:built.units
  };
}

/* ============================================================
   書庫（多本教材）
   - 每本書 meta：{id,name,levels,total,prefix,addedAt}
   - prefix 讓各書的單字 ID 不互撞，進度因此各自獨立
   - 預設/遷移而來的第一本書 prefix="" → 完整沿用既有進度
   ============================================================ */
function loadLibrary(){
  try{ const l=JSON.parse(localStorage.getItem(LS.library)); if(Array.isArray(l)) state.library=l; }catch(e){}
  return state.library;
}
function saveLibrary(){ try{ localStorage.setItem(LS.library,JSON.stringify(state.library)); }catch(e){ toast("⚠️ 書庫儲存失敗：localStorage 可能已滿"); } }
function readBookRaw(id){ try{ const d=localStorage.getItem(bookKey(id)); return d?JSON.parse(d):null; }catch(e){ return null; } }
function newBookId(){ return "b"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// 新增一本書到書庫並設為使用中；回傳 meta（失敗丟出錯誤）
function addBook(raw){
  // 先驗證可解析
  if(!raw || !Array.isArray(raw.parts)) throw new Error("找不到 parts 陣列");
  const probe=buildFlat(raw,"");
  if(!probe.flat.length) throw new Error("單字數為 0，請確認 JSON 內容");
  const id=newBookId();
  const meta={ id, name:raw.source||"未命名教材", levels:raw.levels||"",
               total:probe.flat.length, prefix:id+"__", addedAt:todayStr() };
  try{ localStorage.setItem(bookKey(id),JSON.stringify(raw)); }
  catch(e){ throw new Error("空間不足，無法儲存這本教材"); }
  state.library.push(meta); saveLibrary();
  activateBook(id,true);   // 新書：重設範圍為全部
  return meta;
}

// 切換使用中的書本：載入其資料。resetScope=true 時把範圍重設為全部（避免指向不存在的單元）
function activateBook(id,resetScope){
  const meta=state.library.find(b=>b.id===id);
  if(!meta) return false;
  const raw=readBookRaw(id);
  if(!raw){ toast("讀取教材失敗"); return false; }
  loadData(raw, meta.prefix||"");
  state.book=meta;
  try{ localStorage.setItem(LS.curBook,id); }catch(e){}
  if(resetScope){ state.scope={part:"all",unit:"all",special:null}; saveScope(); }
  return true;
}

// 刪除一本書（可選一併清除該書的學習進度）
function deleteBook(id,purgeProgress){
  const meta=state.library.find(b=>b.id===id);
  state.library=state.library.filter(b=>b.id!==id);
  saveLibrary();
  try{ localStorage.removeItem(bookKey(id)); }catch(e){}
  if(purgeProgress && meta){
    bookProgKeys(meta).forEach(k=>delete state.prog[k]); saveProg();
  }
  // 若刪到的是目前這本，切到剩下的第一本或回匯入頁
  if(state.book && state.book.id===id){
    state.book=null;
    if(state.library.length){ activateBook(state.library[0].id,true); }
    else { state.raw=null; state.flat=[]; state.byId={}; try{localStorage.removeItem(LS.curBook);}catch(e){} }
  }
}

// 取得某本書在 prog 中的所有鍵（prefix="" 的預設書＝不含 "__" 的鍵）
function bookProgKeys(meta){
  const pre=meta?(meta.prefix||""):"";
  return Object.keys(state.prog).filter(k=> pre ? k.indexOf(pre)===0 : k.indexOf("__")===-1);
}
function clearCurrentBookProg(){ bookProgKeys(state.book).forEach(k=>delete state.prog[k]); saveProg(); }

function blankProg(){
  return {status:"new",seen:0,correct:0,wrong:0,streak:0,
          next:"", fav:false, inWrong:false, last:""};
}
function getProg(id){
  if(!state.prog[id]) state.prog[id]=blankProg();
  return state.prog[id];
}
function saveProg(){

}

/* ---------- 每日學習量 / 連續天數（鼓勵養成習慣） ---------- */
function saveDaily(){ try{ localStorage.setItem(LS.daily,JSON.stringify(state.daily)); }catch(e){} }
// 記錄一次學習動作；isNewWordToday 代表這個字今天第一次學（用來算「今天學了幾個字」）
function logDaily(isNewWordToday){
  const d=todayStr();
  if(!state.daily[d]) state.daily[d]={actions:0,words:0};
  state.daily[d].actions++;
  if(isNewWordToday) state.daily[d].words++;
  saveDaily();
}
// 目前連續天數：從今天（若今天已學）或昨天往回數連續有學習的天數
function currentStreak(){
  const has=d=>state.daily[d] && state.daily[d].actions>0;
  let c=new Date(); c.setHours(0,0,0,0);
  const iso=dt=>ymd(dt);
  if(!has(iso(c))) c.setDate(c.getDate()-1);   // 今天還沒學，從昨天起算（連續仍有效）
  let n=0;
  while(has(iso(c))){ n++; c.setDate(c.getDate()-1); }
  return n;
}
// 最長連續天數
function longestStreak(){
  const days=Object.keys(state.daily).filter(d=>state.daily[d].actions>0).sort();
  let best=0,run=0,prev=null;
  days.forEach(d=>{
    if(prev){
      const diff=(new Date(d)-new Date(prev))/86400000;
      run = diff===1 ? run+1 : 1;
    }else run=1;
    if(run>best)best=run; prev=d;
  });
  return best;
}

/* 套用熟悉度（單字卡三按鈕） */
function setFamiliarity(id,level){ // level: weak/normal/familiar
  const p=getProg(id);
  const isNew=p.last!==todayStr();   // 今天第一次學這個字？
  p.seen++; p.last=todayStr();
  if(level==="weak"){ p.status="weak"; p.streak=0; p.next=addDays(1); }
  else if(level==="normal"){ p.status="normal"; p.next=addDays(3); }
  else if(level==="familiar"){
    p.streak++; p.status = p.streak>=2 ? "mastered" : "familiar"; p.next=addDays(7);
  }
  saveProg(); logDaily(isNew);
}
/* 測驗 / 學習答題後更新 */
function recordAnswer(id,correct){
  const p=getProg(id);
  const isNew=p.last!==todayStr();   // 今天第一次學這個字？
  p.seen++; p.last=todayStr();
  if(correct){
    p.correct++; p.streak++;
    if(p.streak>=2){ p.status="mastered"; p.next=addDays(7); }
    else { p.status="normal"; p.next=addDays(3); }
  }else{
    p.wrong++; p.streak=0; p.status="weak"; p.next=addDays(1); p.inWrong=true;
  }
  saveProg(); logDaily(isNew);
}

/* 狀態歸類（顯示用） */
function bucket(id){
  const s=getProg(id).status;
  if(s==="weak")return "weak";
  if(s==="normal")return "normal";
  if(s==="familiar"||s==="mastered")return "familiar";
  return "new";
}
function isDueToday(id){
  const p=getProg(id);
  if(p.inWrong) return true;
  if(p.status==="weak") return true;
  if(p.next && p.next<=todayStr()) return true;
  return false;
}

/* ============================================================
   範圍（scope）
   ============================================================ */
function scopeWords(){
  if(state.scope.special==="fav") return state.flat.filter(w=>getProg(w.id).fav);
  if(state.scope.special==="wrong") return state.flat.filter(w=>getProg(w.id).inWrong);
  let arr=state.flat;
  if(state.scope.part!=="all") arr=arr.filter(w=>w.part===state.scope.part);
  if(state.scope.unit!=="all") arr=arr.filter(w=>w.unit===Number(state.scope.unit));
  return arr;
}
function scopeLabel(){
  const s=state.scope;
  if(s.special==="fav") return "收藏單字";
  if(s.special==="wrong") return "錯字本";
  if(s.part==="all") return "全部單字";
  if(s.unit==="all") return `${s.part} 全部`;
  const w=state.flat.find(x=>x.part===s.part && x.unit===Number(s.unit));
  const t=w?w.titleEn:"";
  return t ? `${s.part} Unit ${s.unit} - ${t}` : `${s.part} Unit ${s.unit}`;
}

/* ============================================================
   發音（Web Speech API）
   ============================================================ */
const speechOK = ("speechSynthesis" in window);
let _voices = [];
function loadVoices(){ try{ _voices = window.speechSynthesis.getVoices() || []; }catch(e){} }
if(speechOK){
  loadVoices();
  // 部分瀏覽器語音清單為非同步載入，需監聽事件補抓
  if("onvoiceschanged" in window.speechSynthesis) window.speechSynthesis.onvoiceschanged = loadVoices;
}
// 是否含中日韓文字 → 用來判斷該用中文還是英文語音
function hasCJK(s){ return /[㐀-鿿豈-﫿]/.test(String(s)); }
// 依語言挑一個已安裝的語音（找不到完全相符就退而求其次同語系）
function pickVoice(lang){
  const lc=lang.toLowerCase();
  return _voices.find(v=>v.lang && v.lang.toLowerCase()===lc)
      || _voices.find(v=>v.lang && v.lang.toLowerCase().startsWith(lc.split("-")[0]));
}
function speak(text){
  if(!speechOK){ toast("此瀏覽器不支援發音功能"); return; }
  try{
    window.speechSynthesis.cancel();
    if(!_voices.length) loadVoices();
    const zh = hasCJK(text);
    const lang = zh ? "zh-TW" : "en-US";
    const voice = pickVoice(lang) || (zh ? pickVoice("zh") : null);
    if(zh && !voice){ toast("此裝置沒有安裝中文語音，無法朗讀中文"); return; }
    const u=new SpeechSynthesisUtterance(text);
    u.lang = voice ? voice.lang : lang;
    if(voice) u.voice = voice;
    u.rate=state.settings.rate; u.volume=state.settings.volume; u.pitch=state.settings.pitch;
    window.speechSynthesis.speak(u);
  }catch(e){ /* 靜默 */ }
}
// 整理單字的中文朗讀字串：合併各義、去掉括號註記與符號，念起來較順
function zhSpeakText(w){
  let t=w.senses.map(s=>s.meaning).join("，");
  const cleaned=t.replace(/[\(（\[【][^)）\]】]*[\)）\]】]/g,"").replace(/[；;]/g,"，").replace(/[≒≠=]/g,"").trim();
  return cleaned || t;
}

/* ============================================================
   自動連續播放（聽力複習）
   - 念完一張（英文 N 次 → 可選中文）才換下一張，全程用 onend 串接
   - token 機制：暫停 / 換頁時讓進行中的 callback 立即失效
   ============================================================ */
const autoPlay = { on:false, token:0 };

// 一張卡片要念的序列：英文重複 N 次（停在正面）→ 可選中文（翻到背面）
function buildSpeakQueue(w){
  const q=[];
  const n=Math.max(1, Number(state.settings.apRepeat)||1);
  for(let i=0;i<n;i++) q.push({text:w.word, zh:false});
  if(state.settings.apZh){
    const zt=zhSpeakText(w);
    if(zt) q.push({text:zt, zh:true});
  }
  return q;
}

// 依序朗讀一個序列，全部念完才呼叫 onAllDone
function speakSequence(items, onAllDone){
  const myToken=autoPlay.token;
  let i=0;
  function next(){
    if(myToken!==autoPlay.token) return;          // 已被取消
    if(i>=items.length){ onAllDone&&onAllDone(); return; }
    const it=items[i++];
    if(!speechOK || !it.text){ next(); return; }
    // 念中文時自動翻面顯示中文
    if(state.settings.apFlip) setFcFace(it.zh);
    const voice=pickVoice(it.zh?"zh-TW":"en-US")||(it.zh?pickVoice("zh"):null);
    if(it.zh && !voice){ next(); return; }         // 沒中文語音就略過中文
    let advanced=false;
    const cont=()=>{
      if(advanced)return; advanced=true;
      if(myToken!==autoPlay.token) return;
      // 同一張卡片內，段落之間（英文重複、英文→中文）插入「詞間停頓」
      if(i>=items.length){ next(); return; }      // 最後一段不加（換卡停頓由 autoStep 處理）
      const gap=Math.max(0,Number(state.settings.apItemGap)||0)*1000;
      if(gap>0) setTimeout(()=>{ if(myToken===autoPlay.token) next(); }, gap);
      else next();
    };
    try{
      const u=new SpeechSynthesisUtterance(it.text);
      u.lang=voice?voice.lang:(it.zh?"zh-TW":"en-US");
      if(voice)u.voice=voice;
      u.rate=state.settings.rate; u.volume=state.settings.volume; u.pitch=state.settings.pitch;
      u.onend=cont; u.onerror=cont;
      // 後備計時：萬一 onend 不觸發（部分行動瀏覽器），估算時間後仍前進
      setTimeout(cont, Math.max(1400, it.text.length*230/(state.settings.rate||1)) + 1200);
      window.speechSynthesis.speak(u);
    }catch(e){ cont(); }
  }
  next();
}

function setFcFace(toBack){
  const c=document.getElementById("fcCard"); if(!c)return;
  fcState.flipped=!!toBack; c.classList.toggle("flip",!!toBack);
}
function updateAutoBtn(){
  const b=document.getElementById("fcAuto");
  if(!b)return;
  b.textContent=autoPlay.on?"⏸":"▶︎";
  b.classList.toggle("playing",autoPlay.on);
}

function toggleAutoPlay(v){ autoPlay.on ? stopAutoPlay() : startAutoPlay(v); }

function startAutoPlay(v){
  if(!speechOK){ toast("此瀏覽器不支援發音功能"); return; }
  if(!fcState.list.length) return;
  try{ window.speechSynthesis.cancel(); }catch(e){}   // 清掉先前手動播放的殘留
  autoPlay.on=true; autoPlay.token++;
  updateAutoBtn();
  autoStep(v);
}
function stopAutoPlay(){
  if(!autoPlay.on && autoPlay.token===0){ return; }
  autoPlay.on=false; autoPlay.token++;            // 讓進行中的 callback 失效
  try{ window.speechSynthesis.cancel(); }catch(e){}
  updateAutoBtn();
}
function autoStep(v){
  if(!autoPlay.on) return;
  const myToken=autoPlay.token;
  const w=fcState.list[fcState.idx];
  speakSequence(buildSpeakQueue(w), ()=>{
    if(myToken!==autoPlay.token || !autoPlay.on) return;
    setTimeout(()=>{
      if(myToken!==autoPlay.token || !autoPlay.on) return;
      if(fcState.idx+1>=fcState.list.length){
        if(state.settings.apLoop){ fcState.idx=0; }
        else { stopAutoPlay(); toast("自動播放結束 🎉"); return; }
      }else{
        fcState.idx++;
      }
      renderFc(v);          // 換下一張（會重畫成正面）
      autoStep(v);          // 繼續播放
    }, Math.max(0,Number(state.settings.apGap)||0)*1000);
  });
}

document.getElementById("fileInput").addEventListener("change",function(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    let obj;
    try{ obj=JSON.parse(ev.target.result); }
    catch(err){ showImportError("JSON 格式錯誤：無法解析。"+err.message); resetFileInput(); return; }
    let meta;
    try{ meta=addBook(obj); }   // 加入書庫並設為使用中
    catch(err){ showImportError("資料結構錯誤："+err.message); resetFileInput(); return; }

    toast("✅ 已加入書庫："+meta.name+"（"+meta.total+" 字）");
    go("home"); // 匯入後自動進入首頁
  };
  reader.onerror=()=>{ showImportError("讀取檔案失敗。"); resetFileInput(); };
  reader.readAsText(file,"utf-8");
});
function resetFileInput(){ document.getElementById("fileInput").value=""; }
function showImportError(msg){
  if(state.view!=="import") go("import");

/* 取最近 n 天的每日學習量（由舊到新） */
function lastNDays(n){
  const arr=[]; const c=new Date(); c.setHours(0,0,0,0);
  for(let i=0;i<n;i++){
    const d=ymd(c), rec=state.daily[d]||{};
    arr.unshift({date:d, words:rec.words||0, actions:rec.actions||0});
    c.setDate(c.getDate()-1);
  }
  return arr;
}
/* 學習熱度圖（GitHub 風格方格）：一格一天；達到每日目標當天變綠，未達標依比例加深 */
function heatColor(n,goal){
  if(n<=0) return "#1b2240";
  const g=goal>0?goal:20;
  if(n>=g) return "var(--success)";        // 達標
  const r=n/g;
  if(r<0.34) return "rgba(124,92,255,.35)";
  if(r<0.67) return "rgba(124,92,255,.6)";
  return "rgba(124,92,255,.9)";
}
function heatmapHtml(weeks){
  weeks=weeks||20;
  const goal=state.settings.dailyGoal||0;
  const today=new Date(); today.setHours(0,0,0,0);
  const iso=dt=>ymd(dt);
  const cell=weeks>40?11:13;   // 一年視圖縮小一點
  const cur=new Date(today);
  cur.setDate(cur.getDate() - today.getDay() - (weeks-1)*7);  // 對齊到 (weeks-1) 週前的週日
  let cols="";
  for(let w=0;w<weeks;w++){
    let cells="";
    for(let d=0;d<7;d++){
      const ds=iso(cur), rec=state.daily[ds], n=rec?rec.words:0;
      const future=cur>today;
      cells+=`<div title="${ds}：${n} 個" style="width:${cell}px;height:${cell}px;border-radius:3px;background:${future?'transparent':heatColor(n,goal)}"></div>`;
      cur.setDate(cur.getDate()+1);
    }
    cols+=`<div style="display:flex;flex-direction:column;gap:3px">${cells}</div>`;
  }
  return `<div style="display:flex;gap:3px;overflow-x:auto;padding-bottom:4px">${cols}</div>`;
}
// 連續達標天數（words>=每日目標）
function goalStreak(){
  const goal=state.settings.dailyGoal||0;
  if(goal<=0) return 0;
  const ok=d=>state.daily[d] && (state.daily[d].words||0)>=goal;
  let c=new Date(); c.setHours(0,0,0,0);
  if(!ok(ymd(c))) c.setDate(c.getDate()-1);
  let n=0; while(ok(ymd(c))){ n++; c.setDate(c.getDate()-1); }
  return n;
}
let heatWeeks=20;   // 熱度圖顯示範圍（週）：20 / 26 / 53

  const ranges=[["20","20 週"],["26","半年"],["53","一年"]];

  v.innerHTML=`
    <div class="topbar"><button class="iconbtn" id="pgBack">←</button><h2>學習紀錄</h2><span style="width:42px"></span></div>

    </div>

    <div class="panel">
      <div class="row spread" style="margin-bottom:8px">
        <b>${done?"今日已達標 🎉":"今日目標"}</b>
        <span class="${done?'badge familiar':'muted small'}">${today.words} / ${goal} 個</span>
      </div>
      <div class="bar"><span class="${done?'seg-familiar':'seg-normal'}" style="width:${pct}%"></span></div>
      <div class="row spread" style="margin-top:12px;align-items:center">
        <span class="muted small">每日目標</span>

    <div class="stat-grid">
      ${statCell(today.words,"今天學了","var(--warning)")}

    <div class="panel" style="margin-top:14px">

function setupSwipe(card,v){
  let x0=null,y0=null;
  card.addEventListener("touchstart",e=>{x0=e.touches[0].clientX;y0=e.touches[0].clientY;},{passive:true});
  card.addEventListener("touchend",e=>{
    if(x0==null)return;
    const dx=e.changedTouches[0].clientX-x0, dy=e.changedTouches[0].clientY-y0;
    if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)){ fcMove(dx<0?1:-1,v); }
    x0=null;
  },{passive:true});
}

  if(f==="fav") arr=arr.filter(w=>getProg(w.id).fav);

   ============================================================ */
const learnState={queue:[],idx:0,answered:false,round:0,correct:0};
VIEWS.learn=function(v){
  const words=scopeWords();
  if(words.length<1){ v.innerHTML=simpleEmpty("學習","這個範圍沒有單字"); $("#eBack").onclick=()=>go("home"); return; }
  // 優先：今日複習 > 不熟 > 未學 > 其他
  const due=words.filter(w=>isDueToday(w.id));
  const weak=words.filter(w=>bucket(w.id)==="weak"&&!isDueToday(w.id));
  const fresh=words.filter(w=>bucket(w.id)==="new"&&!isDueToday(w.id)&&bucket(w.id)!=="weak");
  const rest=words.filter(w=>!due.includes(w)&&!weak.includes(w)&&!fresh.includes(w));
  let q=[...due,...weak,...fresh,...rest];
  q=q.slice(0,Math.min(q.length,20));
  learnState.queue=q; learnState.idx=0; learnState.answered=false; learnState.correct=0;
  renderLearn(v);
};
function renderLearn(v){
  if(learnState.idx>=learnState.queue.length){ return renderLearnDone(v); }
  const w=learnState.queue[learnState.idx];
  const dir=Math.random()<0.5?"en2zh":"zh2en"; // 看英文選中文 / 看中文選英文
  learnState.curDir=dir;
  const choices=makeChoices(w,dir);
  learnState.curChoices=choices;
  const prompt = dir==="en2zh"?esc(w.word):esc(meaningLine(w));
  v.innerHTML=`
    <div class="topbar"><button class="iconbtn" id="eBack">←</button>
      <div class="center"><h2 style="font-size:18px">學習模式</h2>
      <div class="muted small">${learnState.idx+1} / ${learnState.queue.length}</div></div>
      <button class="iconbtn" id="ePlay">🔊</button></div>
    <div class="bar" style="margin-bottom:6px"><span class="seg-familiar" style="width:${(learnState.idx/learnState.queue.length*100).toFixed(1)}%"></span></div>
    <div class="muted small center" style="margin-bottom:4px">${dir==="en2zh"?"請選出正確的中文意思":"請選出正確的英文單字"}</div>
    <div class="q-prompt">${prompt}</div>
    <div id="eOpts">
      ${choices.map((c,i)=>`<button class="opt" data-i="${i}">${esc(dir==="en2zh"?meaningLine(c):c.word)}</button>`).join("")}
    </div>`;
  $("#eBack").onclick=()=>go("home");
  $("#ePlay").onclick=()=>speak(w.word);
  v.querySelectorAll("#eOpts .opt").forEach(b=>b.onclick=()=>learnAnswer(Number(b.dataset.i),v));
};
function learnAnswer(i,v){
  const w=learnState.queue[learnState.idx];
  const chosen=learnState.curChoices[i];
  const correct=chosen.id===w.id;
  recordAnswer(w.id,correct);
  if(correct)learnState.correct++;
  v.querySelectorAll("#eOpts .opt").forEach((b,bi)=>{
    b.disabled=true;
    const c=learnState.curChoices[bi];
    if(c.id===w.id)b.classList.add("correct");
    else if(bi===i)b.classList.add("wrong");
    else b.classList.add("dim");
  });
  const opts=$("#eOpts");
  opts.insertAdjacentHTML("beforeend",
    `<button class="btn primary" id="eNext" style="margin-top:8px">${correct?"答對！下一題 ›":"正確答案：" + esc(learnState.curDir==="en2zh"?meaningLine(w):w.word)+" · 下一題 ›"}</button>`);
  $("#eNext").onclick=()=>{ learnState.idx++; renderLearn(v); };
}
function renderLearnDone(v){
  const total=learnState.queue.length;
  v.innerHTML=`
    <div class="topbar"><button class="iconbtn" id="eBack">←</button><h2>學習完成</h2><span style="width:42px"></span></div>
    <div class="panel center" style="background:var(--cardGrad)">
      <div style="font-size:40px">🎉</div>
      <div style="font-size:22px;font-weight:800;margin:8px 0">本輪完成</div>
      <div class="muted">答對 ${learnState.correct} / ${total}</div>
    </div>
    <button class="btn primary" id="eAgain" style="margin-bottom:10px">再來一輪</button>
    <button class="btn ghost" id="eHome">回首頁</button>`;
  $("#eBack").onclick=()=>go("home");
  $("#eHome").onclick=()=>go("home");
  $("#eAgain").onclick=()=>go("learn");
}

/* 產生選擇題選項：1 正確 + 3 干擾（poolWords 預設為目前範圍） */
function makeChoices(w,dir,poolWords){
  const base=(poolWords&&poolWords.length)?poolWords:scopeWords();
  const pool=base.filter(x=>x.id!==w.id);
  let distract=sample(pool,3);
  if(distract.length<3){ // 範圍不足，從全部補
    const extra=state.flat.filter(x=>x.id!==w.id && !distract.some(d=>d.id===x.id));
    distract=distract.concat(sample(extra,3-distract.length));
  }
  return shuffle([w,...distract]);
}

/* ============================================================
   視圖：測試設定
   ============================================================ */
const testCfg={count:10,type:"choice",dir:"mix",instant:true,onlyWeak:false,onlyToday:false,unitKeys:[]};

// 取某 Part 的單元清單（含標題、字數、唯一 key）
function unitsOf(part){
  const seen=new Set(), out=[];
  state.flat.filter(w=>w.part===part).forEach(w=>{
    if(!seen.has(w.unit)){ seen.add(w.unit); out.push({unit:w.unit,key:part+"_"+w.unit,titleEn:w.titleEn,count:w.wordCount}); }
  });
  out.sort((a,b)=>a.unit-b.unit);
  return out;
}
function partsList(){ return [...new Set(state.flat.map(w=>w.part))]; }
// 把單元每 5 個分一組（每 5 回聯合測驗）
function chunkUnits(part,size){
  const us=unitsOf(part), groups=[];
  for(let i=0;i<us.length;i+=size) groups.push(us.slice(i,i+size));
  return groups;
}
// 測驗實際取用的單字池：有自選單元就用自選，否則用目前範圍
function testPool(){
  if(testCfg.unitKeys && testCfg.unitKeys.length){
    const set=new Set(testCfg.unitKeys);
    const arr=state.flat.filter(w=>set.has(w.part+"_"+w.unit));
    if(arr.length) return arr;
  }
  return scopeWords();
}
function testScopeLabel(){
  if(testCfg.unitKeys && testCfg.unitKeys.length) return `自選 ${testCfg.unitKeys.length} 單元 · ${testPool().length} 字`;
  return scopeLabel()+"（目前範圍）";
}

/* ============================================================
   視圖：測驗範圍選擇（可複選多個單元 + 每5回聯合）
   ============================================================ */
VIEWS.testScope=function(v){
  const sel=new Set(testCfg.unitKeys||[]);
  const parts=partsList();
  const GROUP=5; // 每幾回一組

  // 每 5 回聯合：各 Part 的分組按鈕
  let presetHtml="";
  parts.forEach(part=>{
    const groups=chunkUnits(part,GROUP);
    presetHtml+=`<div class="muted small" style="margin:10px 0 6px">${part}</div><div class="row wrap" style="gap:8px">`;
    groups.forEach(g=>{
      const keys=g.map(u=>u.key);
      const on=keys.every(k=>sel.has(k));
      presetHtml+=`<button class="chip ${on?'active':''}" data-preset="${keys.join(',')}">${part} ${g[0].unit}–${g[g.length-1].unit}</button>`;
    });
    presetHtml+=`</div>`;
  });

  // 自選單元清單（各 Part 可全選 / 清除）
  let listHtml="";
  parts.forEach(part=>{
    const us=unitsOf(part);
    const allOn=us.every(u=>sel.has(u.key));
    listHtml+=`<div class="row spread" style="margin:16px 0 8px">
      <span style="font-weight:700">${part}</span>
      <span class="row" style="gap:6px">
        <button class="btn sm ghost" style="width:auto" data-part-all="${part}">${allOn?'取消整':'全選'} ${part}</button>
      </span></div>`;
    us.forEach(u=>{
      const on=sel.has(u.key);
      listHtml+=`<button class="unit-row ${on?'active':''}" data-key="${u.key}" style="width:100%;text-align:left;color:var(--text)">
        <div class="row spread">
          <div><div class="u-no">Unit ${u.unit} ${on?'✓':''}</div>
            <div class="u-title">${esc(u.titleEn)}</div>
            <div class="muted small">${u.count} words</div></div>
          <div style="font-size:20px">${on?'☑':'☐'}</div>
        </div></button>`;
    });
  });

  v.innerHTML=`
    <div class="topbar"><button class="iconbtn" id="scBack">←</button>
      <h2 style="font-size:18px">測驗範圍</h2><span style="width:42px"></span></div>

    <div class="panel">
      <div style="font-weight:700;margin-bottom:2px">每 5 回聯合測驗</div>
      <div class="muted small">點一下即選取該組單元（會取代目前選擇）</div>
      ${presetHtml}
    </div>

    <div class="row spread" style="margin:4px 2px 0">
      <span style="font-weight:700">自選單元</span>
      <button class="btn sm ghost" style="width:auto" id="scClear">清除全部</button>
    </div>
    ${listHtml}

    <div style="height:84px"></div>
    <div style="position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 30%);padding-top:14px;margin:0 -16px;padding-left:16px;padding-right:16px">
      <div class="muted small center" style="margin-bottom:8px" id="scCount"></div>
      <button class="btn primary" id="scApply">套用範圍</button>
    </div>`;

  const refreshCount=()=>{
    const el=$("#scCount");
    if(el) el.textContent = (testCfg.unitKeys&&testCfg.unitKeys.length)
      ? `已選 ${testCfg.unitKeys.length} 單元 · ${testPool().length} 個單字`
      : `未自選 → 將使用目前範圍（${esc(scopeLabel())}）`;
  };
  refreshCount();

  $("#scBack").onclick=()=>go("testSetup");
  $("#scApply").onclick=()=>go("testSetup");
  $("#scClear").onclick=()=>{ testCfg.unitKeys=[]; go("testScope"); };

  // 每5回 preset：取代選擇
  v.querySelectorAll("[data-preset]").forEach(b=>b.onclick=()=>{
    testCfg.unitKeys=b.dataset.preset.split(","); go("testScope");
  });
  // 整個 Part 全選 / 取消
  v.querySelectorAll("[data-part-all]").forEach(b=>b.onclick=()=>{
    const part=b.dataset.partAll; const keys=unitsOf(part).map(u=>u.key);
    const cur=new Set(testCfg.unitKeys||[]);
    const allOn=keys.every(k=>cur.has(k));
    keys.forEach(k=>{ allOn?cur.delete(k):cur.add(k); });
    testCfg.unitKeys=[...cur]; go("testScope");
  });
  // 單一單元切換
  v.querySelectorAll("[data-key]").forEach(b=>b.onclick=()=>{
    const cur=new Set(testCfg.unitKeys||[]);
    cur.has(b.dataset.key)?cur.delete(b.dataset.key):cur.add(b.dataset.key);
    testCfg.unitKeys=[...cur]; go("testScope");
  });
};

   視圖：測試
   ============================================================ */
const testState={qs:[],idx:0,correct:0,wrongList:[],answered:false};
function startTest(){
  let arr=testPool();
  if(testCfg.onlyWeak) arr=arr.filter(w=>bucket(w.id)==="weak");
  if(testCfg.onlyToday) arr=arr.filter(w=>isDueToday(w.id));
  if(!arr.length){ toast("此條件下沒有可測單字"); return; }
  let n=testCfg.count==="all"?arr.length:Math.min(testCfg.count,arr.length);
  const picked=sample(arr,n);
  testState.qs=picked.map(w=>{
    let dir=testCfg.dir==="mix"?(Math.random()<.5?"en2zh":"zh2en"):testCfg.dir;
    return {w,type:testCfg.type,dir};
  });
  testState.idx=0; testState.correct=0; testState.wrongList=[]; testState.answered=false;
  go("test");
}
VIEWS.test=function(v){
  if(testState.idx>=testState.qs.length){ return renderTestResult(v); }
  const q=testState.qs[testState.idx];
  const total=testState.qs.length;
  let body="";
  if(q.type==="choice")      body=renderChoiceQ(q);
  else if(q.type==="tf")     body=renderTfQ(q);
  else                       body=renderWrittenQ(q);
  v.innerHTML=`
    <div class="topbar"><button class="iconbtn" id="qBack">←</button>
      <div class="center"><div style="font-weight:700">${testState.idx+1} / ${total}</div>
      <div class="muted small">${q.type==="choice"?"選擇題":q.type==="tf"?"是非題":"筆試題"}</div></div>
      <button class="iconbtn" id="qPlay">🔊</button></div>
    <div class="bar" style="margin-bottom:16px"><span class="seg-familiar" style="width:${(testState.idx/total*100).toFixed(1)}%"></span></div>
    <div id="qBody">${body}</div>`;
  $("#qBack").onclick=()=>{ if(confirm("離開測試？目前進度不會保存。"))go("home"); };
  $("#qPlay").onclick=()=>speak(q.w.word);
  testState.answered=false;
  bindTestQ(q,v);
};

function renderChoiceQ(q){
  const choices=makeChoices(q.w,q.dir,testPool());
  q._choices=choices;
  const prompt=q.dir==="en2zh"?esc(q.w.word):esc(meaningLine(q.w));
  return `<div class="muted small center">${q.dir==="en2zh"?"選出正確中文意思":"選出正確英文單字"}</div>
    <div class="q-prompt">${prompt}</div>
    <div id="qOpts">${choices.map((c,i)=>`<button class="opt" data-i="${i}">${esc(q.dir==="en2zh"?meaningLine(c):c.word)}</button>`).join("")}</div>`;
}
function renderTfQ(q){
  // 顯示一英一中，50% 正確配對
  const correct=Math.random()<.5;
  let shownMeaning;
  if(correct){ shownMeaning=meaningLine(q.w); }
  else{
    const other=sample(testPool().filter(x=>x.id!==q.w.id),1)[0]||q.w;
    shownMeaning=meaningLine(other);
  }
  q._tfCorrect=correct;
  return `<div class="muted small center">判斷下面的配對是否正確</div>
    <div class="panel center" style="margin:16px 0">
      <div style="font-size:26px;font-weight:800">${esc(q.w.word)}</div>
      <div class="divider"></div>
      <div style="font-size:18px;line-height:1.5">${esc(shownMeaning)}</div>
    </div>
    <div class="grid2"><button class="btn success" data-tf="true">✓ 正確</button>
      <button class="btn danger" data-tf="false">✗ 錯誤</button></div>`;
}
function renderWrittenQ(q){
  return `<div class="muted small center">看中文意思，輸入英文單字</div>
    <div class="q-prompt">${esc(meaningLine(q.w))}</div>
    <input class="search" id="qInput" placeholder="輸入英文，按 Enter 送出" autocomplete="off" autocapitalize="off" spellcheck="false">
    <button class="btn primary" id="qSubmit" style="margin-top:6px">送出</button>`;
}

function bindTestQ(q,v){
  if(q.type==="choice"){
    v.querySelectorAll("#qOpts .opt").forEach(b=>b.onclick=()=>{
      if(testState.answered)return;
      const c=q._choices[Number(b.dataset.i)];
      finishTestQ(q,c.id===q.w.id,v,{type:"choice",chosenIdx:Number(b.dataset.i)});
    });
  }else if(q.type==="tf"){
    v.querySelectorAll("[data-tf]").forEach(b=>b.onclick=()=>{
      if(testState.answered)return;
      const ans=b.dataset.tf==="true";
      finishTestQ(q,ans===q._tfCorrect,v,{type:"tf"});
    });
  }else{
    const inp=$("#qInput"), btn=$("#qSubmit");
    const submit=()=>{
      if(testState.answered)return;
      const ok=normWord(inp.value)===normWord(q.w.word);
      finishTestQ(q,ok,v,{type:"written",typed:inp.value});
    };
    btn.onclick=submit;
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();submit();} });
    setTimeout(()=>inp.focus(),50);
  }
}
function normWord(s){ return String(s||"").trim().toLowerCase().replace(/\s+/g," "); }

function finishTestQ(q,correct,v,info){
  testState.answered=true;
  recordAnswer(q.w.id,correct);
  if(correct)testState.correct++;
  else testState.wrongList.push(q.w);

  const body=$("#qBody");
  // 視覺回饋
  if(info.type==="choice"){
    v.querySelectorAll("#qOpts .opt").forEach((b,bi)=>{
      b.disabled=true; const c=q._choices[bi];
      if(c.id===q.w.id)b.classList.add("correct");
      else if(bi===info.chosenIdx)b.classList.add("wrong");
      else b.classList.add("dim");
    });
  }else if(info.type==="tf"){
    v.querySelectorAll("[data-tf]").forEach(b=>b.disabled=true);
  }else{
    const inp=$("#qInput"); if(inp)inp.disabled=true;
    const btn=$("#qSubmit"); if(btn)btn.disabled=true;
  }
  const showAns = (!correct || testCfg.instant);
  const fb=document.createElement("div");
  fb.style.marginTop="14px";
  fb.innerHTML=`
    <div class="panel" style="border:1px solid ${correct?'var(--success)':'var(--danger)'}">
      <div style="font-weight:800;color:${correct?'var(--success)':'var(--danger)'}">${correct?"✓ 答對":"✗ 答錯"}</div>
      ${showAns?`<div class="small" style="margin-top:6px">正確答案：<b>${esc(q.w.word)}</b></div>
        <div class="muted small" style="margin-top:2px">${esc(meaningLine(q.w))}</div>`:""}
    </div>
    <button class="btn primary" id="qNext" style="margin-top:10px">${testState.idx+1>=testState.qs.length?"看結果":"下一題 ›"}</button>`;
  body.appendChild(fb);
  $("#qNext").onclick=()=>{ testState.idx++; go("test"); };
}

function renderTestResult(v){
  const total=testState.qs.length, c=testState.correct, w=total-c;
  const rate=total?Math.round(c/total*100):0;
  v.innerHTML=`
    <div class="topbar"><button class="iconbtn" id="rBack">←</button><h2>測驗結果</h2><span style="width:42px"></span></div>
    <div class="panel center" style="background:var(--cardGrad)">
      <div style="font-size:46px;font-weight:800">${rate}%</div>
      <div class="muted">正確率</div>
      <div class="row" style="justify-content:center;gap:24px;margin-top:14px">
        <div><div style="font-size:24px;font-weight:800;color:var(--success)">${c}</div><div class="muted small">答對</div></div>
        <div><div style="font-size:24px;font-weight:800;color:var(--danger)">${w}</div><div class="muted small">答錯</div></div>
      </div>
    </div>
    ${testState.wrongList.length?`
      <div class="panel">
        <div class="row spread" style="margin-bottom:8px"><span style="font-weight:700">錯題列表 (${testState.wrongList.length})</span>
          <button class="btn sm primary" id="rAddWrong" style="width:auto">全部加入錯字本</button></div>
        ${testState.wrongList.map(x=>`<div class="wcard s-weak" style="cursor:default">
          <div class="grow"><div class="w-en">${esc(x.word)}</div><div class="w-zh">${esc(meaningLine(x))}</div></div>
          <button class="iconbtn" data-play="${esc(x.word)}">🔊</button></div>`).join("")}
      </div>`:`<div class="panel center muted">全部答對 🎉</div>`}
    <button class="btn primary" id="rAgain" style="margin-bottom:10px">重新測驗</button>
    <button class="btn ghost" id="rHome">回首頁</button>`;
  $("#rBack").onclick=()=>go("home");
  $("#rHome").onclick=()=>go("home");
  $("#rAgain").onclick=()=>go("testSetup");
  v.querySelectorAll("[data-play]").forEach(b=>b.onclick=()=>speak(b.dataset.play));
  // 答錯的字其實已在 recordAnswer 時自動 inWrong=true；此鈕再次確保
  const add=$("#rAddWrong");
  if(add)add.onclick=()=>{ testState.wrongList.forEach(x=>{getProg(x.id).inWrong=true;}); saveProg(); toast("已加入錯字本"); };
};

/* ============================================================
   視圖：配對
   ============================================================ */
const matchState={pairs:[],cards:[],sel:null,start:0,timer:null,done:0};
VIEWS.match=function(v){
  const words=scopeWords();
  if(words.length<2){ v.innerHTML=simpleEmpty("配對","這個範圍單字太少（至少 2 個）"); $("#eBack").onclick=()=>go("home"); return; }
  const n=Math.min(6, words.length);   // 固定最多 6 個單字（12 張卡），避免爆版
  const picked=sample(words,n);
  matchState.pairs=picked;
  let cards=[];
  picked.forEach(w=>{
    cards.push({id:w.id,type:"en",text:w.word,word:w.word});
    cards.push({id:w.id,type:"zh",text:meaningLine(w),word:w.word});
  });
  matchState.cards=shuffle(cards);
  matchState.sel=null; matchState.done=0; matchState.start=Date.now();
  renderMatch(v);
  startMatchTimer();
};
function startMatchTimer(){
  clearInterval(matchState.timer);
  matchState.timer=setInterval(()=>{
    const el=$("#mTime");
    if(!el){clearInterval(matchState.timer);return;}
    el.textContent=((Date.now()-matchState.start)/1000).toFixed(1)+"s";
  },100);
}
function renderMatch(v){
  const cols=2;   // 固定 2 欄，中文意思較長也讀得清楚、不爆版
  v.innerHTML=`
    <div class="topbar"><button class="iconbtn" id="eBack">←</button>
      <div class="center"><h2 style="font-size:18px">配對</h2><div class="muted small" id="mTime">0.0s</div></div>
      <button class="iconbtn" id="mRestart">↻</button></div>
    <div class="muted small center" style="margin-bottom:12px">點兩張卡片配對英文與中文</div>
    <div class="match-grid" id="mGrid" style="grid-template-columns:repeat(${cols},1fr)"></div>`;
  const grid=$("#mGrid");
  matchState.cards.forEach((c,i)=>{
    const d=document.createElement("div");
    d.className="mcard "+c.type; d.dataset.i=i; d.textContent=c.text;
    d.onclick=()=>matchPick(i,d,v);
    grid.appendChild(d);
  });
  $("#eBack").onclick=()=>{clearInterval(matchState.timer);go("home");};
  $("#mRestart").onclick=()=>{clearInterval(matchState.timer);go("match");};
}
function matchPick(i,el,v){
  const c=matchState.cards[i];
  if(el.classList.contains("ok")||el.classList.contains("sel"))return;
  if(c.type==="en")speak(c.word);
  if(matchState.sel===null){ matchState.sel=i; el.classList.add("sel"); return; }
  if(matchState.sel===i)return;
  const prevI=matchState.sel; const prev=matchState.cards[prevI];
  const prevEl=$(`#mGrid .mcard[data-i="${prevI}"]`);
  matchState.sel=null;
  if(prev.id===c.id && prev.type!==c.type){
    // 配對成功：縮小淡出後「保留空位」（不移除元素），其他卡片維持原位不移動
    matchState.done++;
    const allDone=matchState.done===matchState.pairs.length;
    [el,prevEl].forEach(x=>{ if(x){ x.classList.remove("sel"); x.classList.add("ok"); } });
    if(allDone) setTimeout(()=>matchWin(v),320);
  }else{
    // 配對失敗
    el.classList.add("sel","err"); prevEl.classList.add("err");
    setTimeout(()=>{
      el.classList.remove("sel","err"); prevEl.classList.remove("sel","err");
    },380);
  }
}
function matchWin(v){
  clearInterval(matchState.timer);
  const t=((Date.now()-matchState.start)/1000).toFixed(1);
  setTimeout(()=>{
    const grid=$("#mGrid");
    if(grid)grid.insertAdjacentHTML("afterend",
      `<div class="panel center" style="margin-top:16px;background:var(--cardGrad)">
        <div style="font-size:38px">🎉</div>
        <div style="font-size:20px;font-weight:800;margin:6px 0">全部配對完成</div>
        <div class="muted">用時 ${t} 秒</div>
        <button class="btn primary" id="mAgain" style="margin-top:14px">再玩一次</button>
      </div>`);
    const a=$("#mAgain"); if(a)a.onclick=()=>go("match");
  },120);
}

    </div>

    <div class="panel">
      <div style="font-weight:700;margin-bottom:10px">資料管理</div>
      <button class="btn ghost" id="cfgLibrary" style="margin-bottom:8px">📚 我的書庫</button>
      <button class="btn ghost" id="cfgReimport" style="margin-bottom:8px">＋ 新增教材到書庫</button>
      <button class="btn ghost" id="cfgClearProg" style="margin-bottom:8px">清除本書學習紀錄</button>
      <button class="btn ghost" id="cfgClearWrong" style="margin-bottom:8px">清除本書錯字本</button>
      <button class="btn ghost" id="cfgClearFav" style="margin-bottom:8px">清除本書收藏</button>
      <button class="btn danger" id="cfgClearAll">清除全部資料（含書庫所有教材）</button>
    </div>`;
  $("#cfgBack").onclick=()=>go("home");

  v.querySelectorAll("[data-range]").forEach(r=>r.oninput=()=>{
    state.settings[r.dataset.range]=Number(r.value);
    const lab=v.querySelector(`[data-rangeval="${r.dataset.range}"]`); if(lab)lab.textContent=Number(r.value).toFixed(2);
    saveSettings();
  });
  v.querySelectorAll("[data-toggle]").forEach(t=>t.onchange=()=>{
    const k=t.dataset.toggle;
    if(k==="fcOrderRandom"){ state.settings.fcOrder=t.checked?"random":"original"; }
    else state.settings[k]=t.checked;
    saveSettings();
  });
  $("#cfgTest").onclick=()=>speak("example");
  $("#cfgLibrary").onclick=()=>go("library");
  $("#cfgReimport").onclick=()=>triggerFile();
  $("#cfgClearProg").onclick=()=>{ if(confirm("清除「本書」所有學習紀錄（熟悉度、複習日期、答題次數）？收藏與錯字本一併清除。")){ clearCurrentBookProg(); toast("已清除本書學習紀錄"); } };
  $("#cfgClearWrong").onclick=()=>{ if(confirm("清除本書錯字本？")){ state.flat.forEach(w=>{getProg(w.id).inWrong=false;}); saveProg(); toast("已清除錯字本"); } };
  $("#cfgClearFav").onclick=()=>{ if(confirm("清除本書所有收藏？")){ state.flat.forEach(w=>{getProg(w.id).fav=false;}); saveProg(); toast("已清除收藏"); } };
  $("#cfgClearAll").onclick=()=>{ if(confirm("清除全部資料（書庫所有教材、所有學習紀錄、設定）？此動作無法復原。")){
    try{
      state.library.forEach(b=>localStorage.removeItem(bookKey(b.id)));
      localStorage.removeItem(LS.data);localStorage.removeItem(LS.prog);localStorage.removeItem(LS.settings);
      localStorage.removeItem(LS.scope);localStorage.removeItem(LS.library);localStorage.removeItem(LS.curBook);
      localStorage.removeItem(LS.daily);
    }catch(e){}
    state.raw=null;state.flat=[];state.byId={};state.prog={};state.library=[];state.book=null;state.daily={};
    state.settings=defaultSettings();state.scope={part:"all",unit:"all",special:null};
    go("import");
  } };
};
function rangeRow(label,key,min,max,step,val){
  return `<div class="set-row"><span>${label}</span>
    <span class="row"><input type="range" data-range="${key}" min="${min}" max="${max}" step="${step}" value="${val}">
    <span class="muted small" data-rangeval="${key}" style="width:38px;text-align:right">${Number(val).toFixed(2)}</span></span></div>`;
}

/* 共用：簡單空狀態（含返回） */
function simpleEmpty(title,msg){
  return `<div class="topbar"><button class="iconbtn" id="eBack">←</button><h2>${title}</h2><span style="width:42px"></span></div>
    <div class="empty"><div class="ico">📭</div>${msg}</div>`;
}

/* ============================================================
   鍵盤操作（單字卡）
   ============================================================ */
document.addEventListener("keydown",e=>{
  if(state.view!=="flashcards")return;
  if(e.target.tagName==="INPUT")return;
  const v=viewEl();
  if(e.key==="ArrowRight"){ e.preventDefault(); fcMove(1,v); }
  else if(e.key==="ArrowLeft"){ e.preventDefault(); fcMove(-1,v); }
  else if(e.key===" "){ e.preventDefault(); flipCard(); }
});

/* ============================================================
   啟動：從 localStorage 還原
   ============================================================ */
async function boot(){
  // 設定
  try{ const s=JSON.parse(localStorage.getItem(LS.settings)); if(s)Object.assign(state.settings,s); }catch(e){}
  // 範圍
  try{ const sc=JSON.parse(localStorage.getItem(LS.scope)); if(sc)Object.assign(state.scope,sc); }catch(e){}
  // 學習紀錄
  try{ const p=JSON.parse(localStorage.getItem(LS.prog)); if(p&&typeof p==="object")state.prog=p; }catch(e){}
  // 每日學習量
  try{ const dd=JSON.parse(localStorage.getItem(LS.daily)); if(dd&&typeof dd==="object")state.daily=dd; }catch(e){}

  loadLibrary();

  // 1) 書庫已有教材 → 載入上次使用中的那本（保留範圍）
  if(state.library.length){
    let curId=null; try{ curId=localStorage.getItem(LS.curBook); }catch(e){}
    const target=state.library.find(b=>b.id===curId)||state.library[0];
    if(activateBook(target.id)){ go("home"); return; }
  }

  // 2) 尚無書庫，但有舊版單本快取 → 自動遷移成第一本（prefix=""，完整保留既有進度）
  let migrated=null;
  try{ const d=localStorage.getItem(LS.data); if(d)migrated=JSON.parse(d); }catch(e){}
  if(migrated && Array.isArray(migrated.parts)){
    try{
      const probe=buildFlat(migrated,"");
      if(probe.flat.length){
        const id=newBookId();
        const meta={id,name:migrated.source||"核心字彙",levels:migrated.levels||"",total:probe.flat.length,prefix:"",addedAt:todayStr()};
        localStorage.setItem(bookKey(id),JSON.stringify(migrated));
        state.library=[meta]; saveLibrary();
        if(activateBook(id)){ go("home"); return; }
      }
    }catch(e){ /* 遷移失敗則繼續往下 */ }
  }

  // 3) 全新使用者 → 嘗試自動抓同目錄 vocabulary.json 當第一本
  try{
    const res=await fetch("./vocabulary.json",{cache:"no-cache"});
    if(res.ok){ addBook(await res.json()); go("home"); return; }
  }catch(e){ /* 離線或 file://：略過 */ }

  // 4) 什麼都沒有 → 匯入頁
  go("import");
}
boot();
</script>
